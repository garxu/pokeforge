<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PokeForge — Ultimate Pokémon Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/framer-motion@11/dist/framer-motion.umd.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ═══════════ DESIGN SYSTEM ═══════════ */
:root {
  --bg0:#020409;--bg1:#060810;--bg2:#0A0D18;--bg3:#0E1220;--bg4:#121728;
  --border1:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.09);--border3:rgba(255,255,255,0.16);
  --gold:#FFCB14;--gold2:rgba(255,203,20,0.14);--gold3:rgba(255,203,20,0.28);
  --blue:#4F6EF7;--green:#00D896;--red:#FF4055;--purple:#9B6DFF;
  --t1:#EEF2FF;--t2:#9BAAC4;--t3:#56637A;--t4:#2E3648;
  --font-h:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
  --r1:8px;--r2:14px;--r3:20px;--r4:28px;--r5:9999px;
  --shadow1:0 2px 8px rgba(0,0,0,0.5);--shadow2:0 8px 32px rgba(0,0,0,0.6);--shadow3:0 20px 60px rgba(0,0,0,0.7);
  --ease:cubic-bezier(0.32,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg0);color:var(--t1);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-b);border:none;outline:none;cursor:pointer;background:none}
img{display:block;max-width:100%}
input{font-family:var(--font-b);border:none;outline:none;background:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TYPE COLORS */
.type-badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:var(--r5);font-size:0.68rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#fff;white-space:nowrap}
.dc-physical{background:rgba(240,128,48,0.18);color:#F08030;border:1px solid rgba(240,128,48,0.3)}
.dc-special{background:rgba(104,144,240,0.18);color:#6890F0;border:1px solid rgba(104,144,240,0.3)}
.dc-status{background:rgba(160,160,160,0.12);color:#999;border:1px solid rgba(160,160,160,0.2)}

/* LOADER */
.global-loader{position:fixed;inset:0;background:var(--bg0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:9999}
.global-loader.hidden{display:none}
.pb-ring{width:72px;height:72px;position:relative}
@keyframes ringRotate{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes glow{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:0.6}}
@keyframes typeIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}

/* LAYOUT */
#root{min-height:100vh;display:flex;flex-direction:column}
.navbar{position:sticky;top:0;z-index:500;height:58px;padding:0 clamp(12px,3vw,40px);display:flex;align-items:center;gap:14px;background:rgba(2,4,9,0.85);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border1)}
.main-content{flex:1;max-width:1400px;margin:0 auto;width:100%;padding:0 clamp(12px,3vw,40px) 80px}
.page-wrap{animation:fadeUp 0.4s var(--ease)}

/* GRADIENT MESH BG */
.mesh-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.mesh-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.07}

/* GLASS CARD */
.glass{background:rgba(10,13,24,0.7);backdrop-filter:blur(16px);border:1px solid var(--border1);border-radius:var(--r3)}
.glass-hi{background:rgba(14,18,32,0.8);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--r3)}

/* PANEL */
.panel{background:var(--bg2);border:1px solid var(--border1);border-radius:var(--r3);overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border1);background:rgba(0,0,0,0.2)}
.panel-title{display:flex;align-items:center;gap:8px;font-family:var(--font-h);font-size:0.88rem;font-weight:700;color:var(--t1)}
.panel-icon{color:var(--gold)}
.panel-body{padding:16px 18px}
.panel-sub{font-size:0.7rem;color:var(--t3)}

/* ACCENT BTN */
.btn-gold{display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:#000;border-radius:var(--r5);padding:9px 20px;font-family:var(--font-h);font-size:0.85rem;font-weight:700;transition:all 0.2s var(--ease);white-space:nowrap}
.btn-gold:hover{background:#FFE045;box-shadow:0 0 20px rgba(255,203,20,0.35);transform:scale(1.03)}
.btn-ghost{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);color:var(--t2);border:1px solid var(--border2);border-radius:var(--r5);padding:8px 16px;font-size:0.82rem;font-weight:600;transition:all 0.2s var(--ease)}
.btn-ghost:hover{border-color:var(--border3);color:var(--t1)}
.btn-ghost.active{background:var(--gold2);color:var(--gold);border-color:rgba(255,203,20,0.3)}

/* SEARCH INPUT */
.search-wrap{position:relative;flex:1}
.search-inner{display:flex;align-items:center;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r5);padding:0 8px 0 14px;transition:border-color 0.2s}
.search-inner:focus-within{border-color:rgba(255,203,20,0.4);box-shadow:0 0 0 3px var(--gold2)}
.search-inner input{flex:1;padding:9px 8px;font-size:0.88rem;color:var(--t1)}
.search-inner input::placeholder{color:var(--t4)}

/* AUTOCOMPLETE */
.autocomplete-drop{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);overflow:hidden;z-index:600;box-shadow:var(--shadow3);max-height:300px;overflow-y:auto}
.ac-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background 0.15s}
.ac-item:hover{background:var(--bg4)}
.ac-sprite{width:40px;height:40px;object-fit:contain;image-rendering:auto}
.ac-name{font-weight:700;font-size:0.85rem;text-transform:capitalize;color:var(--t1)}
.ac-meta{font-size:0.7rem;color:var(--t3);font-family:var(--font-m)}

/* CHIPS */
.chips-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.chip{padding:4px 13px;border-radius:var(--r5);font-size:0.76rem;font-weight:600;background:var(--bg2);border:1px solid var(--border1);color:var(--t2);cursor:pointer;transition:all 0.18s;white-space:nowrap}
.chip:hover{border-color:rgba(255,203,20,0.3);color:var(--gold)}

/* HERO */
.hero-section{padding:clamp(60px,10vw,110px) clamp(16px,4vw,48px) clamp(40px,6vw,60px);text-align:center;position:relative;overflow:hidden}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--gold2);border:1px solid rgba(255,203,20,0.2);border-radius:var(--r5);padding:4px 13px;font-size:0.72rem;font-weight:700;color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:20px}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulseDot 2s ease-in-out infinite}
.hero-title{font-family:var(--font-h);font-size:clamp(3rem,9vw,7rem);font-weight:800;line-height:0.93;letter-spacing:-0.04em;margin-bottom:20px}
.hero-title .w1{display:block;color:var(--t1)}
.hero-title .w2{display:block;color:var(--gold);filter:drop-shadow(0 0 60px rgba(255,203,20,0.4))}
.hero-sub{font-size:clamp(0.88rem,1.8vw,1.05rem);color:var(--t2);max-width:520px;margin:0 auto 36px;line-height:1.75}
.hero-search{max-width:620px;margin:0 auto;position:relative}
.hero-search .search-inner{padding:8px 8px 8px 50px;border-radius:var(--r4);background:var(--bg2);border:1px solid var(--border2)}
.hero-search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}

/* STAT BARS */
.stat-row{display:grid;grid-template-columns:58px 1fr 36px;align-items:center;gap:10px;margin-bottom:8px}
.stat-label{font-size:0.68rem;font-weight:700;color:var(--t3);letter-spacing:0.04em;text-transform:uppercase}
.stat-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;position:relative}
.stat-fill{height:100%;border-radius:3px;width:0;transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1)}
.stat-num{font-family:var(--font-m);font-size:0.8rem;font-weight:600;text-align:right}
.stat-total{display:grid;grid-template-columns:58px 1fr 36px;align-items:center;gap:10px;padding-top:8px;border-top:1px solid var(--border1);margin-top:4px}

/* POKEMON LAYOUT */
.poke-layout{display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start}
@media(max-width:900px){.poke-layout{grid-template-columns:1fr}}
.poke-card-sticky{position:sticky;top:68px}
@media(max-width:900px){.poke-card-sticky{position:static}}

/* POKEMON HERO CARD */
.poke-card{border-radius:var(--r4);overflow:hidden;border:1px solid var(--border2)}
.poke-banner{height:180px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.banner-rings{position:absolute;inset:0;overflow:hidden;opacity:0.12}
.banner-ring{position:absolute;border-radius:50%;border:1px solid currentColor}
.poke-sprite-wrap{position:relative;z-index:2}
.poke-sprite{width:160px;height:160px;object-fit:contain;filter:drop-shadow(0 12px 30px rgba(0,0,0,0.7));cursor:pointer;transition:transform 0.5s cubic-bezier(0.34,1.56,0.64,1);image-rendering:auto}
.poke-sprite:hover{transform:scale(1.1) translateY(-6px)}
.poke-card-body{padding:16px 18px;background:var(--bg2)}
.poke-number{font-family:var(--font-m);font-size:0.7rem;color:var(--t3);margin-bottom:3px}
.poke-name{font-family:var(--font-h);font-size:1.8rem;font-weight:800;text-transform:capitalize;letter-spacing:-0.03em;line-height:1;margin-bottom:10px}
.types-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item{background:rgba(0,0,0,0.3);border:1px solid var(--border1);border-radius:var(--r2);padding:10px 12px}
.meta-item.full{grid-column:1/-1}
.meta-lbl{font-size:0.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.meta-val{font-size:0.85rem;font-weight:600;text-transform:capitalize;color:var(--t1)}
.meta-val.mono{font-family:var(--font-m)}

/* GENDER BAR */
.gender-bar{height:6px;border-radius:3px;overflow:hidden;display:flex}
.gender-m{background:var(--blue);transition:width 0.8s var(--ease)}
.gender-f{background:#FF6B8A;transition:width 0.8s var(--ease)}

/* IV/EV TABLE */
.ivev-head{display:grid;grid-template-columns:56px 1fr 38px 38px 38px;gap:6px;margin-bottom:6px}
.ivev-hcell{font-size:0.62rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.05em;text-align:center}
.ivev-hcell:first-child{text-align:left}
.ivev-row{display:grid;grid-template-columns:56px 1fr 38px 38px 38px;gap:6px;align-items:center;margin-bottom:5px}
.ivev-lbl{font-size:0.68rem;color:var(--t2);font-weight:600}
.ivev-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.ivev-fill{height:100%;border-radius:2px;transition:width 1s var(--ease)}
.ivev-cell{font-family:var(--font-m);font-size:0.7rem;text-align:center}
.ivev-note{font-size:0.62rem;color:var(--t4);margin-top:8px;line-height:1.5}

/* TYPE CHART */
.te-group{margin-bottom:14px}
.te-group-lbl{font-size:0.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.te-chips{display:flex;flex-wrap:wrap;gap:5px}
.te-chip{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.3);border:1px solid var(--border1);border-radius:var(--r5);padding:3px 9px;font-size:0.7rem;font-weight:700;text-transform:capitalize}
.te-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mult-badge{font-family:var(--font-m);font-size:0.6rem;padding:1px 4px;border-radius:3px;margin-left:1px}
.m4{background:rgba(255,50,50,0.25);color:#ff5555}
.m2{background:rgba(255,140,50,0.2);color:#ffa040}
.mh{background:rgba(80,130,255,0.2);color:#6699ff}
.mq{background:rgba(80,100,255,0.2);color:#99aaff}
.m0{background:rgba(130,130,130,0.2);color:#aaa}

/* EVOLUTION */
.evo-chain{display:flex;align-items:center;flex-wrap:wrap;gap:4px;justify-content:center;padding:4px 0}
.evo-node{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 12px;border-radius:var(--r2);border:1px solid transparent;cursor:pointer;min-width:76px;transition:all 0.2s var(--ease)}
.evo-node:hover{background:var(--bg3);border-color:var(--border2)}
.evo-node.current{background:var(--gold2);border-color:rgba(255,203,20,0.3)}
.evo-img{width:66px;height:66px;object-fit:contain;image-rendering:auto}
.evo-name{font-size:0.7rem;font-weight:700;text-transform:capitalize;text-align:center;color:var(--t1)}
.evo-lv{font-size:0.62rem;color:var(--t3);text-align:center}
.evo-arrow-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--t3)}
.evo-trigger-txt{font-size:0.6rem;text-align:center;max-width:54px;line-height:1.3}

/* MOVES TABLE */
.filter-row{display:flex;flex-wrap:wrap;gap:5px;padding:12px 16px;border-bottom:1px solid var(--border1);background:rgba(0,0,0,0.2)}
.move-table-wrap{overflow-x:auto}
table.mtable{width:100%;border-collapse:collapse;font-size:0.82rem;min-width:560px}
.mtable th{padding:9px 13px;text-align:left;font-size:0.64rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--t3);background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border1);white-space:nowrap}
.mtable td{padding:9px 13px;border-bottom:1px solid var(--border1);vertical-align:middle}
.mtable tbody tr{transition:background 0.15s}
.mtable tbody tr:hover td{background:rgba(255,255,255,0.025)}
.mtable tbody tr:last-child td{border-bottom:none}
.move-name-cell{font-weight:700;text-transform:capitalize;cursor:pointer;color:var(--t1);transition:color 0.15s}
.move-name-cell:hover{color:var(--gold)}
.learn-tag{font-family:var(--font-m);font-size:0.68rem;padding:2px 8px;border-radius:4px;white-space:nowrap}
.lt-level{background:rgba(255,203,20,0.12);color:var(--gold)}
.lt-tm{background:rgba(79,110,247,0.15);color:#8299ff}
.lt-egg{background:rgba(155,109,255,0.15);color:#b899ff}
.lt-tutor{background:rgba(0,216,150,0.15);color:#00D896}
.lt-other{background:rgba(140,140,140,0.1);color:#888}
.pwr-val{font-family:var(--font-m);font-weight:700}

/* NATURES */
.natures-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.nature-card{background:rgba(0,0,0,0.3);border:1px solid var(--border1);border-radius:var(--r2);padding:10px 12px;text-align:center;transition:border-color 0.2s}
.nature-card.rec{border-color:rgba(255,203,20,0.35);background:var(--gold2)}
.nature-name{font-family:var(--font-h);font-size:0.85rem;font-weight:700;text-transform:capitalize;margin-bottom:3px}
.nature-mods{font-size:0.67rem;line-height:1.5}
.nmod-up{color:var(--green)}
.nmod-dn{color:var(--red)}
.nmod-neu{color:var(--t4)}

/* BEST MOVES */
.bm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.bm-card{background:var(--bg3);border:1px solid var(--border1);border-radius:var(--r3);padding:14px;position:relative;overflow:hidden;transition:all 0.2s var(--ease);cursor:pointer}
.bm-card:hover{border-color:var(--border3);transform:translateY(-3px);box-shadow:var(--shadow2)}
.bm-top-stripe{position:absolute;top:0;left:0;right:0;height:3px}
.bm-top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.bm-name{font-family:var(--font-h);font-size:0.92rem;font-weight:800;text-transform:capitalize;color:var(--t1)}
.bm-stab{font-size:0.62rem;font-weight:700;color:var(--gold);letter-spacing:0.05em}
.bm-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.bm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.bms{background:rgba(0,0,0,0.4);border-radius:var(--r1);padding:6px 4px;text-align:center}
.bms-lbl{font-size:0.58rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.bms-val{font-family:var(--font-m);font-size:0.85rem;font-weight:700;margin-top:2px}

/* COUNTERS */
.counters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px}
.counter-card{background:var(--bg3);border:1px solid var(--border1);border-radius:var(--r2);padding:10px 6px;text-align:center;cursor:pointer;transition:all 0.2s var(--ease)}
.counter-card:hover{border-color:var(--border3);transform:translateY(-2px);box-shadow:var(--shadow1)}
.counter-img{width:54px;height:54px;object-fit:contain;margin:0 auto;image-rendering:auto}
.counter-name{font-size:0.67rem;font-weight:700;text-transform:capitalize;margin-top:4px;color:var(--t2)}

/* MOVE DETAIL */
.move-detail-wrap{max-width:700px;margin:0 auto}
.md-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r4);overflow:hidden}
.md-head{padding:26px 28px;border-bottom:1px solid var(--border1)}
.md-name{font-family:var(--font-h);font-size:2.2rem;font-weight:800;letter-spacing:-0.04em;text-transform:capitalize;margin-bottom:10px}
.md-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.md-body{padding:24px 28px}
.md-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:20px}
.md-stat-box{background:rgba(0,0,0,0.35);border:1px solid var(--border1);border-radius:var(--r2);padding:13px;text-align:center}
.md-stat-lbl{font-size:0.65rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.md-stat-val{font-family:var(--font-m);font-size:1.1rem;font-weight:700}
.md-desc-box{background:rgba(0,0,0,0.25);border:1px solid var(--border1);border-radius:var(--r2);padding:14px 16px;font-size:0.88rem;color:var(--t2);line-height:1.8;margin-bottom:16px}
.md-section-lbl{font-size:0.68rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}

/* TABS */
.subtab-bar{display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border1);border-radius:var(--r5);padding:4px;width:fit-content;margin:0 auto 20px}
.subtab{padding:7px 18px;border-radius:var(--r5);font-size:0.82rem;font-weight:700;background:transparent;color:var(--t2);transition:all 0.2s var(--ease);display:flex;align-items:center;gap:6px;white-space:nowrap}
.subtab.on{background:var(--gold);color:#000}
.subtab:not(.on):hover{background:var(--bg3);color:var(--t1)}

/* PROGRESS INDICATOR */

/* ═══════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════ */
function calcTypeEff(defTypes) {
  const res = {};
  ALL_TYPES.forEach(atk => {
    let m = 1;
    defTypes.forEach(def => {
      const v = (TYPE_CHART[atk]||{})[def];
      if (v !== undefined) m *= v;
    });
    res[atk] = m;
  });
  return res;
}

function calcStatRange(base, statName, lv=100) {
  const isHp = statName === 'hp';
  const min = isHp
    ? Math.floor(((2*base+0+0)*lv/100)+lv+10)
    : Math.floor(Math.floor(((2*base+0+0)*lv/100)+5)*0.9);
  const max = isHp
    ? Math.floor(((2*base+31+63)*lv/100)+lv+10)
    : Math.floor(Math.floor(((2*base+31+63)*lv/100)+5)*1.1);
  const neu = isHp
    ? Math.floor(((2*base+31+0)*lv/100)+lv+10)
    : Math.floor(((2*base+31+0)*lv/100)+5);
  return {min,max,neu};
}

function recNatures(stats) {
  const sm = Object.fromEntries(stats.map(s => [s.stat.name, s.base_stat]));
  const atk = sm['attack']||0, spa = sm['special-attack']||0, spd = sm['speed']||0;
  const rec = [];
  if (atk >= spa) { rec.push('adamant','jolly'); }
  if (spa > atk)  { rec.push('modest','timid'); }
  if (spd < 60)   { rec.push('brave','quiet'); }
  return rec;
}

const moveCache = new Map();
async function fetchMove(name) {
  if (moveCache.has(name)) return moveCache.get(name);
  try {
    const r = await fetch(`https://pokeapi.co/api/v2/move/${name}`);
    if (!r.ok) return null;
    const d = await r.json();
    moveCache.set(name, d);
    return d;
  } catch { return null; }
}

  return (
    <motion.div className="autocomplete-drop" initial={{opacity:0,y:-8}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-8}} transition={{duration:0.15}}>

/* ═══════════════════════════════════════════════════════
   STAT BAR
═══════════════════════════════════════════════════════ */
function StatBar({name, value, ev=0, animKey}) {
  const ref = useRef(null);
  const pct = Math.min((value/255)*100,100);
  const col = STAT_COLORS[name] || '#888';
  const lbl = STAT_LABELS[name] || name;
  const col2 = value >= 130 ? '#3DDE88' : value >= 90 ? 'var(--t1)' : value >= 60 ? 'var(--t2)' : 'var(--red)';

  useEffect(() => {
    if (ref.current) {
      ref.current.style.width = '0%';
      const t = setTimeout(() => { if(ref.current) ref.current.style.width = pct+'%'; }, 80);
      return () => clearTimeout(t);
    }
  }, [animKey, pct]);

  return (
    <div className="stat-row">
      <span className="stat-label">{lbl}</span>
      <div className="stat-track">
        <div ref={ref} className="stat-fill" style={{background:`linear-gradient(90deg,${col},${col}cc)`,width:'0%'}}/>
      </div>
      <span className="stat-num" style={{color:col2}}>{value}</span>
    </div>
  );
}

function TypeBadge({type, size='normal'}) {

  const fs = size==='sm' ? '0.63rem' : '0.68rem';
  const pad = size==='sm' ? '2px 7px' : '2px 10px';
  return <span className="type-badge" style={{background:col,fontSize:fs,padding:pad}}>{type}</span>;
}

/* ═══════════════════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════════════════ */
function Navbar({onSearch, onTab, activeTab, pokemonList}) {
  const [q, setQ] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const [focused, setFocused] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!q || q.length < 2) { setSuggestions([]); return; }
    const ql = q.toLowerCase();
    const hits = pokemonList.filter(p => p.name.includes(ql) || String(p.id).startsWith(ql)).slice(0,6);
    setSuggestions(hits);
  }, [q, pokemonList]);

  useEffect(() => {
    const handler = (e) => { if(wrapRef.current && !wrapRef.current.contains(e.target)) setSuggestions([]); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const handleSelect = (name) => { setQ(''); setSuggestions([]); onSearch(name); };

  return (
    <nav className="navbar">
      {/* Logo */}
      <div style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',flexShrink:0}} onClick={() => onTab('home')}>
        <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" fill="#070A14" stroke="#FFCB14" strokeWidth="1.8"/>
          <path d="M2 20H38" stroke="#FFCB14" strokeWidth="1.8"/>
          <path d="M2 20A18 18 0 0 1 38 20" fill="rgba(255,64,85,0.2)"/>
          <circle cx="20" cy="20" r="6.5" fill="#060810" stroke="#FFCB14" strokeWidth="1.8"/>
          <circle cx="20" cy="20" r="3" fill="#FFCB14"/>
        </svg>
        <span style={{fontFamily:'var(--font-h)',fontSize:'1.35rem',fontWeight:800}}>
          Poke<span style={{color:'var(--gold)'}}>Forge</span>
        </span>
      </div>

      {/* Search */}
      <div className="search-wrap" ref={wrapRef} style={{maxWidth:360}}>
        <div className="search-inner">
          <Icon.Search style={{color:'var(--t4)',flexShrink:0}}/>
          <input
            value={q}
            onChange={e=>setQ(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&q.trim()){handleSelect(q.trim().toLowerCase().replace(/\s+/g,'-'));}}}
            onFocus={()=>setFocused(true)}
            placeholder="Search Pokémon…"
          />
          {q && <button onClick={()=>{setQ('');setSuggestions([]);}} style={{color:'var(--t4)',padding:'4px'}}><Icon.X/></button>}
        </div>
        <AnimatePresence>
          {suggestions.length > 0 && <AutocompleteDropdown items={suggestions} onSelect={handleSelect}/>}
        </AnimatePresence>
      </div>

      {/* Nav tabs */}
      <div style={{display:'flex',gap:4,marginLeft:'auto',flexShrink:0}}>
        {[
          {id:'home',label:'Pokédex',icon:<Icon.Grid/>},
          {id:'moves',label:'Moves',icon:<Icon.Zap/>},
        ].map(t => (
          <button key={t.id} className={`btn-ghost ${activeTab===t.id?'active':''}`} onClick={()=>onTab(t.id)}
            style={{display:'flex',alignItems:'center',gap:5}}>
            {t.icon}<span style={{display:'none',display:'block'}}>{t.label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

/* ═══════════════════════════════════════════════════════
   HERO SECTION
═══════════════════════════════════════════════════════ */
function HeroSection({onSearch, pokemonList}) {
  const [q, setQ] = useState('');
  const [suggestions, setSuggestions] = useState([]);
  const inputRef = useRef(null);
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!q || q.length < 2) { setSuggestions([]); return; }
    const ql = q.toLowerCase();
    const hits = pokemonList.filter(p => p.name.includes(ql) || String(p.id).startsWith(ql)).slice(0,8);
    setSuggestions(hits);
  }, [q, pokemonList]);

  useEffect(() => {
    const h = (e) => { if(wrapRef.current && !wrapRef.current.contains(e.target)) setSuggestions([]); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const handleSelect = (name) => { setQ(''); setSuggestions([]); onSearch(name); };
  const handleSubmit = () => {
    const v = q.trim().toLowerCase().replace(/\s+/g,'-');
    if (v) handleSelect(v);
  };

  const QUICK = ['charizard','mewtwo','garchomp','gengar','lucario','mimikyu','dragapult','sylveon','iron-valiant','flutter-mane'];

  return (
    <section className="hero-section">
      <motion.div initial={{opacity:0,y:30}} animate={{opacity:1,y:0}} transition={{duration:0.7,ease:[0.32,0,0.2,1]}}>
        <div className="hero-eyebrow">
          <div className="hero-dot"/>
          Powered by PokéAPI · Gen I – IX · 1025 Pokémon
        </div>
        <h1 className="hero-title">
          <span className="w1">The Ultimate</span>
          <span className="w2">PokéForge</span>
        </h1>
        <p className="hero-sub">Every stat, move, counter, type matchup, evolution, IV/EV reference &amp; competitive analysis. All in one place.</p>
      </motion.div>

      <motion.div initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{duration:0.7,delay:0.15,ease:[0.32,0,0.2,1]}}>
        <div className="hero-search" ref={wrapRef}>
          <Icon.Search className="hero-search-icon" style={{color:'var(--t3)',position:'absolute',left:18,top:'50%',transform:'translateY(-50%)',pointerEvents:'none',zIndex:1}}/>
          <div className="search-inner" style={{borderRadius:'var(--r4)'}}>
            <input
              ref={inputRef}
              value={q}
              onChange={e=>setQ(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')handleSubmit();}}
              placeholder="Search Pokémon by name or Pokédex number…"
              style={{fontSize:'1rem',padding:'11px 12px 11px 30px',flex:1}}
              autoFocus
            />
            <button className="btn-gold" onClick={handleSubmit} style={{margin:'2px'}}>
              <Icon.Search style={{width:15,height:15}}/>
              Search
            </button>
          </div>
          <AnimatePresence>
            {suggestions.length > 0 && <AutocompleteDropdown items={suggestions} onSelect={handleSelect}/>}
          </AnimatePresence>
        </div>

        <div style={{marginTop:14}}>
          <div className="chips-row">
            <span style={{fontSize:'0.74rem',color:'var(--t3)',alignSelf:'center'}}>Popular:</span>
            {QUICK.map(name => (
              <span key={name} className="chip" onClick={()=>handleSelect(name)}>
                {name.replace(/-/g,' ')}
              </span>
            ))}
          </div>
        </div>
      </motion.div>
    </section>
  );
}

/* ═══════════════════════════════════════════════════════
   TYPE EFFECTIVENESS PANEL
═══════════════════════════════════════════════════════ */
function TypeEffPanel({types}) {
  const eff = useMemo(() => calcTypeEff(types), [types.join(',')]);
  const groups = {'4×':[],'2×':[],'1×':[],'½×':[],'¼×':[],'0×':[]};
  Object.entries(eff).forEach(([t,m]) => {
    if(m===4) groups['4×'].push(t);
    else if(m===2) groups['2×'].push(t);
    else if(m===1) groups['1×'].push(t);
    else if(m===0.5) groups['½×'].push(t);
    else if(m===0.25) groups['¼×'].push(t);
    else if(m===0) groups['0×'].push(t);
  });
  const labels = {'4×':'Super Weak','2×':'Weak','1×':'Normal','½×':'Resists','¼×':'Doubly Resists','0×':'Immune'};
  const mclss = {'4×':'m4','2×':'m2','½×':'mh','¼×':'mq','0×':'m0'};

  return (
    <div className="panel">
      <div className="panel-head">
        <div className="panel-title"><Icon.Shield className="panel-icon"/>Type Effectiveness</div>
        <span className="panel-sub">Attacking types vs this Pokémon</span>
      </div>
      <div className="panel-body">
        {Object.entries(groups).filter(([,t])=>t.length>0 && _!=='1×').map(([k,ts]) => (
          <div key={k} className="te-group">
            <div className="te-group-lbl">
              <span className={`mult-badge ${mclss[k]||''}`}>{k}</span>
              {labels[k]}
            </div>
            <div className="te-chips">
              {ts.map(t => (
                <div key={t} className="te-chip">
                  <div className="te-dot" style={{background:TYPE_COLORS[t]}}/>
                  {t}
                  <span className={`mult-badge ${mclss[k]||''}`}>{k}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
